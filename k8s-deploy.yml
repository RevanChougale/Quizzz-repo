apiVersion: apps/v1
kind: Deployment

metadata:
  name: quiz-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: quiz-service

  template:
    metadata:
      labels:
        app: quiz-service

    spec:
      containers:
        - name: quiz-service
          image: revan02/test1:1.3

          ports:
            - containerPort: 1111

---
apiVersion: v1
kind: Service

metadata:
  name: quiz-service-service

spec:
  selector:
    app: quiz-service

  ports:
    - protocol: TCP
      port: 1111
      targetPort: 1111

  type: LoadBalancer
