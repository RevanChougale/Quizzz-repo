spring.application.name=QUIZ-SERVICE
server.port=1111
spring.datasource.url=jdbc:mysql://localhost:3306/micro_yt
spring.datasource.password=root
spring.datasource.username=root

spring.jpa.sql.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.main.allow-bean-definition-overriding=true

#spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.import-check.enabled=false

# Zipkin server URL
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Send 100% traces (for learning)
management.tracing.sampling.probability=1.0

# Tell service where admin server is
spring.boot.admin.client.url=http://localhost:6060

# Expose all actuator endpoints
management.endpoints.web.exposure.include=*

# Show health details
management.endpoint.health.show-details=always


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}



# Retry
resilience4j.retry.instances.quizService.max-attempts=3
resilience4j.retry.instances.quizService.wait-duration=1s

# Circuit Breaker
resilience4j.circuitbreaker.instances.quizService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.quizService.sliding-window-size=5
resilience4j.circuitbreaker.instances.quizService.wait-duration-in-open-state=10s


spring.data.redis.host=localhost
spring.data.redis.port=6379


